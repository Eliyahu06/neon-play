<!DOCTYPE html>

<html class="light" lang="fr">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&amp;family=Manrope:wght@300;400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container-high": "#f5f5f5",
                        "surface-bright": "#ffffff",
                        "surface-dim": "#e0e0e0",
                        "secondary-fixed": "#ffbeeb",
                        "on-primary-fixed": "#003f43",
                        "secondary-container": "#ad009b",
                        "on-surface-variant": "#484847",
                        "tertiary-fixed-dim": "#b190ff",
                        "secondary": "#ff59e3",
                        "outline-variant": "#d1d1d1",
                        "error-container": "#9f0519",
                        "primary-fixed-dim": "#00deec",
                        "inverse-surface": "#0e0e0e",
                        "secondary-dim": "#ff59e3",
                        "on-primary-fixed-variant": "#005e64",
                        "on-tertiary-fixed": "#1f0052",
                        "on-secondary-fixed": "#640059",
                        "outline": "#767575",
                        "surface-container-highest": "#eeeeee",
                        "on-error-container": "#ffa8a3",
                        "secondary-fixed-dim": "#ffa8e7",
                        "surface-container-lowest": "#ffffff",
                        "inverse-on-surface": "#fcf9f8",
                        "surface-tint": "#006a71",
                        "on-tertiary": "#ffffff",
                        "surface-variant": "#f5f5f5",
                        "primary-fixed": "#00eefc",
                        "on-error": "#ffffff",
                        "tertiary-dim": "#874cff",
                        "on-primary": "#ffffff",
                        "surface": "#ffffff",
                        "tertiary-container": "#7000ff",
                        "on-background": "#0e0e0e",
                        "inverse-primary": "#8ff5ff",
                        "on-primary-container": "#002022",
                        "on-secondary-fixed-variant": "#950085",
                        "tertiary": "#ac89ff",
                        "primary": "#00b2bd",
                        "on-secondary": "#ffffff",
                        "on-tertiary-fixed-variant": "#4700a7",
                        "on-tertiary-container": "#f8f1ff",
                        "on-secondary-container": "#fff5f8",
                        "surface-container-low": "#fafafa",
                        "tertiary-fixed": "#bda1ff",
                        "surface-container": "#f0f0f0",
                        "error": "#d7383b",
                        "error-dim": "#d7383b",
                        "background": "#ffffff",
                        "primary-dim": "#006a71",
                        "on-surface": "#0e0e0e",
                        "primary-container": "#8ff5ff"
                    },
                    "borderRadius": {
                        "none": "0px",
                        "DEFAULT": "0px",
                        "lg": "0px",
                        "xl": "0px",
                        "full": "9999px"
                    },
                    "spacing": {},
                    "fontFamily": {
                        "headline": ["Space Grotesk"],
                        "body": ["Manrope"],
                        "label": ["Space Grotesk"]
                    }
                },
            },
        }
    </script>
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
        }

        .ambient-glow-blue {
            box-shadow: 0 0 20px rgba(0, 178, 189, 0.1);
        }

        .neon-border-focus:focus-within {
            box-shadow: 0 0 15px rgba(0, 178, 189, 0.2);
            border-color: #00b2bd;
        }
    </style>
</head>

<body class="bg-surface font-body text-on-surface selection:bg-primary/20 selection:text-primary">
    <!-- SideNavBar Shell - Kept Dark -->
    <aside
        class="fixed left-0 top-0 h-full flex flex-col py-8 w-64 border-r border-white/5 bg-[#0e0e0e] font-['Space_Grotesk'] tracking-tight z-50">
        <div class="px-6 mb-12">
            <div class="text-xl font-bold text-[#8ff5ff] tracking-[0.2em] uppercase" style="">NEON PLAY</div>
            <div class="text-[10px] text-[#767575] tracking-widest mt-1" style="">SYS_ADMIN_V1.0</div>
        </div>
        <nav class="flex-1 px-4 space-y-2">
            <!-- Active State: Articles -->
            <a class="flex items-center gap-3 px-4 py-3 text-[#8ff5ff] border-l-2 border-[#ff59e3] bg-[#1a1919] shadow-[0_0_15px_rgba(255,89,227,0.2)] transition-all duration-300"
                href="#" style="">
                <span class="material-symbols-outlined" style="">article</span>
                <span class="text-sm font-medium" style="">Articles</span>
            </a>
            <a class="flex items-center gap-3 px-4 py-3 text-[#767575] hover:text-[#8ff5ff] hover:bg-[#262626]/60 transition-all duration-300"
                href="#" style="">
                <span class="material-symbols-outlined" style="">group</span>
                <span class="text-sm font-medium" style="">Utilisateurs</span>
            </a>
            <a class="flex items-center gap-3 px-4 py-3 text-[#767575] hover:text-[#8ff5ff] hover:bg-[#262626]/60 transition-all duration-300"
                href="#" style="">
                <span class="material-symbols-outlined" style="">comment</span>
                <span class="text-sm font-medium" style="">Commentaires</span>
            </a>
        </nav>
        <div class="px-4 mb-8">
            <button
                class="w-full py-4 bg-[#8ff5ff] text-[#003f43] font-bold text-xs tracking-widest uppercase hover:shadow-[0_0_20px_rgba(143,245,255,0.4)] transition-all"
                style="">
                DÉPLOYER POST
            </button>
        </div>
        <div class="px-4 border-t border-white/5 pt-6 space-y-2">
            <a class="flex items-center gap-3 px-4 py-2 text-[#767575] hover:text-[#8ff5ff] transition-colors" href="#"
                style="">
                <span class="material-symbols-outlined" style="">settings</span>
                <span class="text-xs uppercase tracking-widest" style="">Paramètres</span>
            </a>
            <a class="flex items-center gap-3 px-4 py-2 text-[#767575] hover:text-[#8ff5ff] transition-colors" href="#"
                style="">
                <span class="material-symbols-outlined" style="">logout</span>
                <span class="text-xs uppercase tracking-widest" style="">Déconnexion</span>
            </a>
        </div>
    </aside>
    <!-- Main Content Shell - Switched to Light -->
    <main class="ml-64 min-h-screen bg-surface flex flex-col">
        <!-- TopAppBar -->
        <!-- Page Content: Article Edition -->
        <div class="flex-1 p-12 max-w-6xl w-full mx-auto">
            <div class="mb-12">
                <h1 class="text-on-surface font-headline text-5xl font-bold tracking-tighter" style="">Brouillon : Le
                    Connaisseur Numérique</h1>
            </div>
            <div class="grid grid-cols-12 gap-12">
                <!-- Main Form Section -->
                <div class="col-span-8 space-y-12">
                    <!-- Field: Name -->
                    <div class="group relative">
                        <label
                            class="block text-primary font-headline text-[10px] tracking-[0.2em] uppercase mb-4 transition-all group-focus-within:text-secondary"
                            style="">Titre de l'Article</label>
                        <input
                            class="w-full bg-transparent border-0 border-b border-outline-variant focus:ring-0 focus:border-primary text-2xl font-light tracking-tight pb-4 transition-all placeholder:text-outline/30 focus:shadow-[0_4px_10px_-4px_rgba(0,178,189,0.1)] text-on-surface"
                            type="text" value="L'Esthétique du Silence Artificiel" />
                    </div>
                    <!-- Field: Intro -->
                    <div class="group relative">
                        <label
                            class="block text-primary font-headline text-[10px] tracking-[0.2em] uppercase mb-4 transition-all group-focus-within:text-secondary"
                            style="">Récit Introductif</label>
                        <textarea
                            class="w-full bg-surface-container-low border-0 border-l-2 border-outline-variant focus:ring-0 focus:border-secondary text-on-surface font-body leading-relaxed p-6 transition-all focus:bg-surface-container placeholder:text-outline/30"
                            placeholder="Commencez le flux de l'interface neurale..."
                            rows="6">Dans un monde saturé par le bourdonnement d'une connectivité perpétuelle, le silence devient le luxe ultime. Cet article explore l'émergence des « vides numériques » — des espaces intentionnels d'absence de données conçus pour le connaisseur moderne de la concentration.</textarea>
                    </div><!-- Field: Main Content -->
                    <div class="group relative">
                        <label
                            class="block text-primary font-headline text-[10px] tracking-[0.2em] uppercase mb-4 transition-all group-focus-within:text-secondary">Contenu
                            Principal</label>
                        <textarea
                            class="w-full bg-surface-container-low border-0 border-l-2 border-outline-variant focus:ring-0 focus:border-secondary text-on-surface font-body leading-relaxed p-6 transition-all focus:bg-surface-container placeholder:text-outline/30"
                            placeholder="Écrivez le corps de l'article ici..." rows="15"></textarea>
                    </div>
                </div>
                <!-- Sidebar Controls -->
                <div class="col-span-4 space-y-8">
                    <!-- Score Module -->
                    <div class="bg-surface-container-low p-8 border-l-2 border-primary/40 relative overflow-hidden">
                        <div class="absolute top-0 right-0 w-32 h-32 bg-primary/5 blur-3xl -mr-16 -mt-16 rounded-full">
                        </div>
                        <label class="block text-primary font-headline text-[10px] tracking-[0.2em] uppercase mb-8"
                            style="">Note</label>
                        <div class="flex items-end gap-4">
                            <input
                                class="w-32 bg-transparent border-0 border-b-2 border-primary text-5xl font-headline font-bold text-on-surface focus:ring-0 focus:border-secondary transition-all"
                                max="10" min="0" step="0.1" type="number" value="8.5" />
                            <span class="text-outline font-headline text-sm mb-2" style="">/ 10.0</span>
                        </div>
                        <p class="mt-6 text-[10px] text-outline leading-relaxed uppercase tracking-tighter" style="">
                            Analyse d'impact basée sur la complexité éditoriale et la densité des métadonnées.</p>
                    </div>
                    <!-- Actions -->
                    <div class="space-y-4 pt-8">
                        <button
                            class="w-full py-5 bg-primary text-white font-headline font-bold text-sm tracking-[0.2em] uppercase hover:shadow-[0_0_25px_rgba(0,178,189,0.3)] hover:scale-[1.02] active:scale-100 transition-all"
                            style="">
                            Enregistrer
                        </button>
                        <button
                            class="w-full py-5 border border-outline-variant text-on-surface-variant font-headline font-bold text-sm tracking-[0.2em] uppercase hover:border-error hover:text-error transition-all group flex items-center justify-center gap-2"
                            style="">
                            <span class="material-symbols-outlined text-sm" style="">close</span>
                            Retour à la liste des articles
                        </button>
                    </div>
                </div>
            </div>
            <!-- Preview Card (Asymmetric Layout) -->
        </div>
    </main>
</body>

</html>
